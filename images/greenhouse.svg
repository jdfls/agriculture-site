<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#bfe9ff"/>
  <circle cx="60" cy="56" r="30" fill="#ffd23f"/>
  <rect y="200" width="400" height="100" fill="#5fd068"/>
  <!-- greenhouse body -->
  <rect x="90" y="120" width="220" height="100" fill="#eafaff" stroke="#2b2b3a" stroke-width="4"/>
  <polygon points="90,120 200,70 310,120" fill="#d4f1ff" stroke="#2b2b3a" stroke-width="4"/>
  <!-- glass panes -->
  <line x1="150" y1="120" x2="150" y2="220" stroke="#5ec5ff" stroke-width="3"/>
  <line x1="200" y1="95" x2="200" y2="220" stroke="#5ec5ff" stroke-width="3"/>
  <line x1="250" y1="120" x2="250" y2="220" stroke="#5ec5ff" stroke-width="3"/>
  <line x1="90" y1="160" x2="310" y2="160" stroke="#5ec5ff" stroke-width="3"/>
  <!-- plants inside -->
  <circle cx="125" cy="200" r="14" fill="#3fae4a"/>
  <circle cx="175" cy="200" r="14" fill="#5fd068"/>
  <circle cx="225" cy="200" r="14" fill="#3fae4a"/>
  <circle cx="275" cy="200" r="14" fill="#5fd068"/>
</svg>
