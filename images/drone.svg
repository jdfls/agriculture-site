<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#bfe9ff"/>
  <circle cx="60" cy="56" r="28" fill="#ffd23f"/>
  <!-- crop field rows -->
  <rect y="210" width="400" height="90" fill="#5fd068"/>
  <g stroke="#3fae4a" stroke-width="6">
