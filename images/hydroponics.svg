<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#eafaff"/>
  <!-- water channels -->
  <rect x="40" y="130" width="320" height="26" rx="13" fill="#5ec5ff" stroke="#2b2b3a" stroke-width="4"/>
  <rect x="40" y="200" width="320" height="26" rx="13" fill="#5ec5ff" stroke="#2b2b3a" stroke-width="4"/>
  <!-- pipe -->
  <rect x="40" y="156" width="14" height="44" fill="#2b2b3a"/>
  <!-- plants in net pots, top row -->
  <g>
    <circle cx="90"  cy="120" r="13" fill="#3fae4a"/>
    <circle cx="150" cy="120" r="13" fill="#5fd068"/>
    <circle cx="210" cy="120" r="13" fill="#3fae4a"/>
    <circle cx="270" cy="120" r="13" fill="#5fd068"/>
    <circle cx="330" cy="120" r="13" fill="#3fae4a"/>
  </g>
  <!-- bottom row -->
  <g>
    <circle cx="90"  cy="190" r="13" fill="#5fd068"/>
    <circle cx="150" cy="190" r="13" fill="#3fae4a"/>
    <circle cx="210" cy="190" r="13" fill="#5fd068"/>
    <circle cx="270" cy="190" r="13" fill="#3fae4a"/>
    <circle cx="330" cy="190" r="13" fill="#5fd068"/>
  </g>
  <!-- water drops -->
  <circle cx="200" cy="250" r="6" fill="#5ec5ff"/>
  <circle cx="230" cy="262" r="4" fill="#5ec5ff"/>
</svg>
